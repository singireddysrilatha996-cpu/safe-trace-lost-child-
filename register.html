<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SafeTrace – Register</title>
<link rel="stylesheet" href="style.css">
<style>
  .reg-wrap { display:flex; align-items:flex-start; justify-content:center; padding:90px 20px 60px;
    background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(58,134,255,.07) 0%,transparent 65%); }
  .box { background:var(--surface); border:1px solid var(--border); border-radius:22px;
    padding:48px 44px; width:100%; max-width:520px; animation:up .4s ease; }
  @keyframes up { from{transform:translateY(22px);opacity:0} to{transform:translateY(0);opacity:1} }
  .logo { font-family:'Bebas Neue'; font-size:28px; color:var(--red); letter-spacing:4px; margin-bottom:4px; }
  .logo span { color:var(--text); }
  .title { font-family:'Bebas Neue'; font-size:38px; letter-spacing:1px; margin-bottom:4px; }
  .sub   { font-size:13px; color:var(--muted); margin-bottom:30px; }

  .role-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:6px; }
  .role-card { background:var(--surface2); border:1.5px solid var(--border); border-radius:10px;
    padding:14px 10px; text-align:center; cursor:pointer; transition:all .2s; }
  .role-card:hover  { border-color:var(--blue); }
  .role-card.active { border-color:var(--red); background:rgba(230,57,70,.08); }
  .role-icon { font-size:28px; margin-bottom:6px; }
  .role-name { font-size:12px; font-weight:600; }
  .role-desc { font-size:10px; color:var(--muted); margin-top:3px; }

  .strength-bar  { height:4px; border-radius:4px; background:var(--border); margin-top:8px; overflow:hidden; }
  .strength-fill { height:100%; border-radius:4px; transition:all .3s; width:0; }
  .strength-lbl  { font-size:11px; margin-top:5px; }
  .footer { text-align:center; margin-top:18px; font-size:13px; color:var(--muted); }
  .footer a { color:var(--text); text-decoration:underline; }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Safe<span>Trace</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a><a href="missing.html">Missing Children</a>
  </div>
  <div class="nav-actions"><a href="login.html" class="btn btn-outline">Login</a></div>
</nav>

<div class="reg-wrap">
<div class="box">
  <div class="logo">Safe<span>Trace</span></div>
  <div class="title">Create Account</div>
  <div class="sub">Join SafeTrace — your account is saved and you can login anytime.</div>

  <div class="form-group">
    <label class="form-label">I am registering as…</label>
    <div class="role-grid">
      <div class="role-card active" onclick="setRole('parent',this)">
        <div class="role-icon">👨‍👩‍👧</div>
        <div class="role-name">Parent</div>
        <div class="role-desc">Report my child</div>
      </div>
      <div class="role-card" onclick="setRole('volunteer',this)">
        <div class="role-icon">🤝</div>
        <div class="role-name">Volunteer</div>
        <div class="role-desc">Help community</div>
      </div>
      <div class="role-card" onclick="setRole('authority',this)">
        <div class="role-icon">🚔</div>
        <div class="role-name">Authority</div>
        <div class="role-desc">Law enforcement</div>
      </div>
    </div>
    <input type="hidden" id="role" value="parent">
  </div>

  <div class="form-grid">
    <div class="form-group">
      <label class="form-label">First Name *</label>
      <input class="form-input" id="fname" placeholder="First name">
    </div>
    <div class="form-group">
      <label class="form-label">Last Name *</label>
      <input class="form-input" id="lname" placeholder="Last name">
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Email Address *</label>
    <input class="form-input" id="email" type="email" placeholder="your@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Phone Number *</label>
    <input class="form-input" id="phone" type="tel" placeholder="+91 XXXXX XXXXX">
  </div>
  <div class="form-group">
    <label class="form-label">Password * <span style="color:var(--muted);font-size:11px">(min 6 characters)</span></label>
    <input class="form-input" id="pass" type="password" placeholder="Choose a password" oninput="checkStrength(this.value)">
    <div class="strength-bar"><div class="strength-fill" id="sfill"></div></div>
    <div class="strength-lbl" id="slbl" style="color:var(--muted)"></div>
  </div>
  <div class="form-group">
    <label class="form-label">Confirm Password *</label>
    <input class="form-input" id="pass2" type="password" placeholder="Re-enter password">
  </div>

  <div class="form-error"   id="err"></div>
  <div class="form-success" id="suc"></div>
  <button class="btn-full" onclick="doRegister()" style="margin-top:12px">Create My Account →</button>
  <div class="footer">Already have an account? <a href="login.html">Sign in here</a></div>
</div>
</div>

<div id="toast"><span id="toastIcon">✅</span>&nbsp;<span id="toastMsg"></span></div>
<script src="data.js"></script>
<script>
  if (getSession()) window.location.replace('index.html');

  function setRole(role, el) {
    document.querySelectorAll('.role-card').forEach(function(c){ c.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('role').value = role;
  }

  function checkStrength(val) {
    var score = 0;
    if (val.length >= 6)          score++;
    if (val.length >= 10)         score++;
    if (/[A-Z]/.test(val))        score++;
    if (/[0-9]/.test(val))        score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    var colors = ['','#e63946','#f4a261','#f4a261','#2ecc71','#2ecc71'];
    var labels = ['','Weak','Fair','Fair','Strong','Very Strong'];
    var fill   = document.getElementById('sfill');
    var lbl    = document.getElementById('slbl');
    fill.style.width      = (score / 5 * 100) + '%';
    fill.style.background = colors[score] || '#e63946';
    lbl.textContent       = labels[score] || '';
    lbl.style.color       = colors[score] || '#e63946';
  }

  function doRegister() {
    var fname = document.getElementById('fname').value.trim();
    var lname = document.getElementById('lname').value.trim();
    var email = document.getElementById('email').value.trim();
    var phone = document.getElementById('phone').value.trim();
    var pass  = document.getElementById('pass').value;
    var pass2 = document.getElementById('pass2').value;
    var role  = document.getElementById('role').value;
    var errEl = document.getElementById('err');
    var sucEl = document.getElementById('suc');
    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    if (!fname || !lname || !email || !phone || !pass || !pass2) {
      errEl.textContent = 'Please fill in all required fields.';
      errEl.style.display = 'block'; return;
    }
    if (pass.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.style.display = 'block'; return;
    }
    if (pass !== pass2) {
      errEl.textContent = 'Passwords do not match.';
      errEl.style.display = 'block'; return;
    }

    // registerUser() saves to localStorage — persists across pages
    var result = registerUser(fname, lname, email, pass, phone, role);

    if (result.error) {
      errEl.textContent = result.error;
      errEl.style.display = 'block'; return;
    }

    // Auto-login after registration
    setSession(result.user);
    sucEl.textContent = '🎉 Account created! Logging you in…';
    sucEl.style.display = 'block';
    setTimeout(function(){ window.location.href = 'index.html'; }, 1200);
  }
</script>
</body>
</html>
